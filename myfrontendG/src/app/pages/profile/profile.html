<div class="container mt-5 d-flex justify-content-center">
  <div class="card shadow border-0 rounded-4" style="max-width: 500px; width: 100%;">
    @if (user$ | async; as user) {
      <div class="card-body p-5 text-center">
        <div class="bg-danger text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-4 shadow" style="width: 80px; height: 80px; font-size: 30px;">
          {{ user.name.charAt(0).toUpperCase() }}
        </div>
        <h2 class="fw-bold">{{ user.name }}</h2>
        <p class="text-muted mb-4">{{ user.email }}</p>
        <hr>
        <div class="d-grid gap-2 mt-4">
          <button (click)="logout()" class="btn btn-danger rounded-pill fw-bold">Cerrar Sesión</button>
          <a routerLink="/peticiones" class="btn btn-outline-secondary rounded-pill fw-bold">Volver</a>
        </div>
      </div>
    } @else {
      <div class="text-center p-5">
        <div class="spinner-border text-danger" role="status"></div>
      </div>
    }
  </div>
</div>
