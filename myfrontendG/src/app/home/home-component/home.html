<div class="container text-center py-5">
  <h1 class="display-3 fw-bold mb-4">El cambio empieza con tu firma</h1>
  <div class="row justify-content-center mt-5">
    <div class="col-md-6">
      <div class="input-group input-group-lg shadow-sm rounded-pill overflow-hidden">
        <input type="text" [(ngModel)]="terminoBusqueda" class="form-control border-0 px-4" placeholder="¿Qué quieres cambiar?">
        <button (click)="buscar()" class="btn btn-danger px-5">Buscar</button>
      </div>
    </div>
  </div>
</div>
